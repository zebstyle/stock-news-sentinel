# Stock News Sentinel Configuration File

# ============================================
# STOCKS TO MONITOR
# ============================================
# Comma-separated list of stock symbols to track
stocks=RELIANCE,VEDL,BHARATRAS,APEX,COALINDIA,OLA,GRAPHITE
# ============================================
# NEWS SOURCES
# ============================================
# Comma-separated list of news source URLs
# Note: Some sites may require Selenium for dynamic content
news_sources=https://www.livemint.com/market,https://www.moneycontrol.com/stocksmarketsindia/,https://www.business-standard.com/markets


# Alternative news APIs (optional)
# news_api_key=YOUR_NEWS_API_KEY_HERE
alpha_vantage_key=CTL3JV0DMAWU24HD

# ============================================
# EMAIL CONFIGURATION
# ============================================
# Sender email address
#email_from=

# Recipient email address (can be same as sender)
#email_to=

# Email app password (NOT your regular password)
# For Gmail: https://myaccount.google.com/apppasswords
#email_password=

# SMTP server settings
#smtp_server=smtp.gmail.com
#smtp_port=587

# Email subject prefix
#email_subject_prefix=[Stock Alert]

# ============================================
# MONITORING SETTINGS
# ============================================
# How often to check for news (in minutes)
check_interval_minutes=30

# Minimum sentiment score to trigger alert (-1.0 to 1.0)
# Positive: 0.6 to 1.0 (Bullish)
# Negative: -1.0 to -0.6 (Bearish)
sentiment_threshold=0.65

# Minimum confidence score (0.0 to 1.0)
confidence_threshold=0.7

# Maximum articles to analyze per scan
max_articles_per_scan=50

# ============================================
# SENTIMENT ANALYSIS SETTINGS
# ============================================
# Primary sentiment model: vader (lightweight), finbert (advanced), textblob
# Note: finbert requires transformers & torch (large download ~400MB)
primary_sentiment_model=vader

# Fallback model if primary fails
fallback_sentiment_model=vader

# Enable ensemble sentiment (average of multiple models)
# Note: Requires multiple models installed
enable_ensemble=false

# ============================================
# SCRAPING SETTINGS
# ============================================
# Use Selenium for dynamic content (slower but more reliable)
use_selenium=false

# Browser for Selenium: chrome, firefox, edge
selenium_browser=chrome

# Headless mode (no browser window)
selenium_headless=true

#S Request timeout in seconds
request_timeout=10

# User agent string
user_agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36

# ============================================
# PERSISTENCE SETTINGS
# ============================================
# Path to store analyzed articles
data_file=data/analyzed_articles.json

# Days to keep article history
history_retention_days=30

# ============================================
# LOGGING SETTINGS
# ============================================
# Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level=INFO

# Log file path
log_file=logs/stock_news_sentinel.log

# Enable console logging
log_to_console=true

# ============================================
# AGENT SETTINGS
# ============================================
# Enable autonomous agent mode
enable_agents=true

# Agent execution interval (seconds)
agent_interval=1800

# Maximum retries for failed operations
max_retries=3

# ============================================
# ALERT SETTINGS
# ============================================
# Send daily summary email
send_daily_summary=true

# Daily summary time (24-hour format)
daily_summary_time=18:00

# Alert only on significant news
alert_significant_only=true

# Include article snippet in email
include_article_snippet=true

# Maximum snippet length (characters)
snippet_max_length=300

# ============================================
# ADVANCED SETTINGS
# ============================================
# Enable caching
enable_cache=true

# Cache expiry (minutes)
cache_expiry_minutes=60

# Parallel processing
enable_parallel=true

# Number of worker threads
worker_threads=4

# Rate limiting (requests per minute)
rate_limit=30

# Made with Bob
